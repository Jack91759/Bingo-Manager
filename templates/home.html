<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-admin {
            background: #f44336;
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(244, 67, 54, 0.4);
        }

        .admin-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .admin-title {
            color: #f44336;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .login-form {
            display: none;
            margin-top: 20px;
        }

        .login-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .form-buttons button {
            flex: 1;
            padding: 12px;
            font-size: 0.95em;
        }

        .btn-submit {
            background: #667eea;
            color: white;
        }

        .btn-submit:hover {
            background: #764ba2;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .error {
            color: #f44336;
            background: #ffebee;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .buttons {
                gap: 12px;
            }

            button {
                padding: 12px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎰</div>
        <h1>BINGO</h1>
        <p class="subtitle">Welcome to Bingo</p>

        <div class="buttons">
            <button class="btn-register" onclick="window.location.href='/register-card'">Register Card</button>
            <button class="btn-register" onclick="toggleCardLookup()">View My Card</button>
        </div>

        <div id="cardLookup" class="login-form">
            <div class="error" id="lookupError"></div>
            <form onsubmit="handleCardLookup(event)">
                <div class="form-group">
                    <input type="text" id="cardId" placeholder="Enter your card ID" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-submit">View Card</button>
                    <button type="button" class="btn-cancel" onclick="toggleCardLookup()">Cancel</button>
                </div>
            </form>
        </div>

        <div class="admin-section">
            <div class="admin-title">Admin Access</div>
            <button class="btn-admin" onclick="toggleLoginForm()">Admin Login</button>
            
            <div class="login-form" id="loginForm">
                <div class="error" id="error"></div>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Enter admin password" required>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="btn-submit">Login</button>
                        <button type="button" class="btn-cancel" onclick="toggleLoginForm()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleLoginForm() {
            const form = document.getElementById('loginForm');
            form.classList.toggle('active');
            document.getElementById('error').classList.remove('show');
        }

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/control';
                } else {
                    const error = document.getElementById('error');
                    error.textContent = data.message || 'Invalid password';
                    error.classList.add('show');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                const errorEl = document.getElementById('error');
                errorEl.textContent = 'An error occurred';
                errorEl.classList.add('show');
            });
        }

        function toggleCardLookup() {
            const form = document.getElementById('cardLookup');
            form.classList.toggle('active');
            document.getElementById('lookupError').classList.remove('show');
            document.getElementById('cardId').value = '';
        }

        function handleCardLookup(event) {
            event.preventDefault();
            const cardId = document.getElementById('cardId').value.trim();

            if (!cardId) {
                const error = document.getElementById('lookupError');
                error.textContent = 'Please enter a card ID';
                error.classList.add('show');
                return;
            }

            window.location.href = `/card/${cardId}`;
        }
    </script>
</body>
</html>
